services:
  ollama:
    image: ollama/ollama:latest
    container_name: agentic-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  agent:
    build: .
    container_name: agentic-ai-demo
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      AGENT_PORT: ${AGENT_PORT:-8000}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  pipeline:
    build: .
    container_name: agentic-ai-pipeline
    command: ["python", "-m", "simulator.pipeline_feeder"]
    environment:
      PIPELINE_DEFAULT_SCENARIO: ${PIPELINE_DEFAULT_SCENARIO:-memory_stress}
      PIPELINE_INTERVAL_SECONDS: ${PIPELINE_INTERVAL_SECONDS:-20}
    volumes:
      - .:/app

  sensor:
    build: .
    container_name: agentic-ai-sensor
    depends_on:
      - ollama
      - agent
      - pipeline
    command: ["python", "-m", "simulator.sensor_app"]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      SENSOR_INTERVAL_SECONDS: ${SENSOR_INTERVAL_SECONDS:-8}
      SENSOR_AUTO_REMEDIATE: ${SENSOR_AUTO_REMEDIATE:-false}
    volumes:
      - .:/app

volumes:
  ollama_data:
